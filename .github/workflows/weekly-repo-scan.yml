name: Weekly Repository Scan

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-repo-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scan repositories
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_SCAN_TOKEN: ${{ secrets.REPO_SCAN_TOKEN }}
          REPO_OWNER: pskeffington
          OPERATIONAL_REPOS: Eagle-Eye,trans
          PUBLIC_SCHOLARLY_REPOS: trans-latin,Trans-heb
          PUBLIC_STATUS_REPO: README
        run: python scripts/scan_repos.py

      - name: Render public status
        run: python scripts/render_status.py

      - name: Commit weekly status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md data/repo_inventory.json data/project_status.json docs/storyboard.md docs/weekly
          if git diff --cached --quiet; then
            echo "No status changes to commit."
          else
            git commit -m "Update weekly repository status"
            git push
          fi
